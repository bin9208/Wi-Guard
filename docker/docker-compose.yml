version: "3.9"

services:
  sensing-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust
    image: ruvnet/wifi-densepose:latest
    ports:
      - "3000:3000"   # REST API
      - "3001:3001"   # WebSocket
      - "5005:5005/udp"  # ESP32 UDP
    environment:
      - RUST_LOG=info
      # CSI_SOURCE controls the data source for the sensing server.
      # Options: auto (default) — probe for ESP32 UDP then fall back to simulation
      #          esp32          — receive real CSI frames from an ESP32 on UDP port 5005
      #          wifi           — use host Wi-Fi RSSI/scan data (Windows netsh)
      #          simulated      — generate synthetic CSI data (no hardware required)
      - CSI_SOURCE=${CSI_SOURCE:-auto}
    # command is passed as arguments to ENTRYPOINT (/bin/sh -c), so $CSI_SOURCE is expanded by the shell.
    command: >
      /bin/sh -c "/app/sensing-server --source ${CSI_SOURCE:-auto} --tick-ms 100 --ui-path /app/ui --http-port 3000 --ws-port 3001"

  python-sensing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    image: ruvnet/wifi-densepose:python
    ports:
      - "8765:8765"   # WebSocket
      - "8080:8080"   # UI
    environment:
      - PYTHONUNBUFFERED=1

  # ── Sensing REST API ─────────────────────────────────────────────
  # 모바일 앱 / 외부 시스템용 REST API 서버
  # Swagger UI: http://localhost:8000/docs
  sensing-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: ruvnet/wifi-densepose:api
    ports:
      - "8000:8000"    # FastAPI REST API + Swagger docs
      - "8766:8765"    # WebSocket sensing (mapped to avoid conflict)
    environment:
      - PYTHONUNBUFFERED=1
      - CSI_SOURCE=${CSI_SOURCE:-auto}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/sensing/current"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
